spring:
  application:
    name: auth-jwt
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate.format_sql: true  # 자동 들여쓰기 + 줄바꿈
      hibernate:
        # 명백하게 명시만 해두면 안전하지만, 없어도 기본값이 SpringPhysicalNamingStrategy
        spring.jpa.hibernate.naming.physical-strategy: org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
        jdbc:
          time-zone: Asia/Seoul
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8
    clean-disabled: true

app:
  r2:
    enabled: ${R2_ENABLED:false}
    account-id: ${R2_ACCOUNT_ID:}
    access-key-id: ${R2_ACCESS_KEY_ID:}
    secret-access-key: ${R2_SECRET_ACCESS_KEY:}
    bucket: ${R2_BUCKET:}
    public-base-url: ${R2_PUBLIC_BASE_URL:}
    upload-prefix: ${R2_UPLOAD_PREFIX:profiles/pending}
    presigned-url-expiry-minutes: ${R2_PRESIGNED_URL_EXPIRY_MINUTES:10}
    max-file-size-bytes: ${R2_MAX_FILE_SIZE_BYTES:5242880}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
